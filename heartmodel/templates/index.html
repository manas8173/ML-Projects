<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Disease Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow-lg p-4 rounded-4" style="max-width: 480px; margin:auto;">
      <div class="card-body text-center">
        <h2 class="mb-3 text-primary fw-bold">💓 Heart Disease Predictor</h2>
        <p class="text-muted mb-4">Enter patient details to check for heart disease risk.</p>

        <form id="predictForm" method="POST" action="/predict">
  <div class="form-floating mb-3">
    <input type="number" step="any" name="Age" class="form-control" placeholder="Age" required>
    <label>Age</label>
  </div>

  <div class="form-floating mb-3">
    <select name="Sex" class="form-select" required>
      <option value="1">Male</option>
      <option value="0">Female</option>
    </select>
    <label>Sex</label>
  </div>

  <div class="form-floating mb-3">
    <select name="Chest pain type" class="form-select" required>
      <option value="1">Typical Angina</option>
      <option value="2">Atypical Angina</option>
      <option value="3">Non-Anginal Pain</option>
      <option value="4">Asymptomatic</option>
    </select>
    <label>Chest Pain Type</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="BP" class="form-control" placeholder="BP" required>
    <label>Blood Pressure</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="Cholesterol" class="form-control" placeholder="Cholesterol" required>
    <label>Cholesterol</label>
  </div>

  <div class="form-floating mb-3">
    <select name="FBS over 120" class="form-select" required>
      <option value="1">Yes</option>
      <option value="0">No</option>
    </select>
    <label>FBS > 120</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="EKG results" class="form-control" placeholder="EKG Results" required>
    <label>EKG Results</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="Max HR" class="form-control" placeholder="Max HR" required>
    <label>Max Heart Rate</label>
  </div>

  <div class="form-floating mb-3">
    <select name="Exercise angina" class="form-select" required>
      <option value="1">Yes</option>
      <option value="0">No</option>
    </select>
    <label>Exercise Angina</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="ST depression" class="form-control" placeholder="ST Depression" required>
    <label>ST Depression</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="Slope of ST" class="form-control" placeholder="Slope of ST" required>
    <label>Slope of ST</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="Number of vessels fluro" class="form-control" placeholder="Vessels Fluro" required>
    <label>Number of Vessels Fluro</label>
  </div>

  <div class="form-floating mb-3">
    <input type="number" step="any" name="Thallium" class="form-control" placeholder="Thallium" required>
    <label>Thallium</label>
  </div>

  <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Predict</button>

  <div id="loader" class="mt-3" style="display:none;">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-2">Analyzing...</p>
  </div>
</form>


        {% if prediction_text %}
        <div class="alert alert-{{ color }} mt-4 fs-5 fw-semibold" role="alert">
          {{ prediction_text }}
        </div>
        {% endif %}
      </div>
    </div>
  </div>

  <script>
    // Show spinner while form is submitting
    const form = document.getElementById('predictForm');
    form.addEventListener('submit', () => {
      document.getElementById('loader').style.display = 'block';
    });
  </script>
</body>
</html>
