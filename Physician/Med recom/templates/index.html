<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Recommendation</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-image: url("https://i.pinimg.com/736x/0e/3c/05/0e3c0532640f7be06f9d2966ec0a0bc3.jpg");
    background-size: cover;
    background-position: center;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
  }

  h1 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 40px;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
  }

  .btn {
    padding: 15px 40px;
    font-size: 18px;
    font-weight: 600;
    border: solid 2px white;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.15);
    color: white;
    backdrop-filter: blur(6px);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn:hover {
    background: white;
    color: #0072ff;
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
  }

  /* Popup overlay */
  .popup {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  /* Popup content */
  .popup-content {
    position: relative;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    max-width: 450px;
    width: 90%;
    color: #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .popup-content h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #fff;
  }

  .popup-content input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
  }

  .popup-content button {
    width: 100%;
    padding: 10px;
    background: white;
    color: #0072ff;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .popup-content button:hover {
    background: #0072ff;
    color: white;
  }

  /* Scrollable results section */
  .results {
    margin-top: 15px;
    font-size: 15px;
    line-height: 1.6;
    color: #f3f3f3;
    overflow-y: auto;
    max-height: 45vh;
    padding-right: 10px;
  }

  .results::-webkit-scrollbar {
    width: 6px;
  }

  .results::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.4);
    border-radius: 3px;
  }

  .close {
    position: absolute;
    top: 15px;
    right: 25px;
    color: white;
    font-size: 24px;
    cursor: pointer;
  }

  /* Go Back button */
  .back-btn {
    margin-top: 15px;
    background: rgba(255, 255, 255, 0.2);
    border: solid 2px white;
    color: white;
    border-radius: 10px;
    padding: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
  }

  .back-btn:hover {
    background: white;
    color: #0072ff;
  }
</style>
</head>
<body>

  <h1>Welcome Physician</h1>
  <button class="btn" onclick="openPopup()">Medicine Recommendation</button>

  <div class="popup" id="popup">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">&times;</span>
      <h2>Medicine Recommendation</h2>

      <div id="inputSection">
        <input type="text" id="symptomInput" placeholder="Enter symptom (e.g., fever, acne, headache)" />
        <button onclick="getRecommendation()">Get Recommendation</button>
      </div>

      <div class="results" id="results"></div>
      <button class="back-btn" id="backBtn" style="display:none;" onclick="goBack()">← Go Back</button>
    </div>
  </div>

<script>
function openPopup() {
  document.getElementById('popup').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closePopup() {
  document.getElementById('popup').style.display = 'none';
  document.body.style.overflow = 'auto';
  document.getElementById('results').innerHTML = '';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('backBtn').style.display = 'none';
}

function goBack() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('backBtn').style.display = 'none';
}

async function getRecommendation() {
  const symptom = document.getElementById('symptomInput').value.trim();
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '';

  if (!symptom) {
    resultsDiv.innerHTML = '<p>Please enter a symptom.</p>';
    return;
  }

  resultsDiv.innerHTML = '<p>Loading recommendations...</p>';

  try {
    const response = await fetch("/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ symptom })
    });

    const data = await response.json();

    if (data.error) {
      resultsDiv.innerHTML = `<p>${data.error}</p>`;
    } else {
      let html = '<h3>💊 Top Recommended Medicines:</h3>';
      data.forEach((med, i) => {
        html += `
          <p><strong>${i + 1}. ${med.Drug_Name}</strong> (${med.Rating.toFixed(1)}⭐)<br>
          <em>Reason:</em> ${med.Reason}<br>
          <em>Description:</em> ${med.Description}</p>
          <hr>`;
      });
      resultsDiv.innerHTML = html;
      document.getElementById('inputSection').style.display = 'none';
      document.getElementById('backBtn').style.display = 'block';
    }
  } catch (err) {
    resultsDiv.innerHTML = `<p style="color: red;">Error fetching recommendations. Please try again.</p>`;
  }
}
</script>

</body>
</html>
